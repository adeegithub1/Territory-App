<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TerritoryIQ — India Sales Map v2 (Firebase Live)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<style>
  /* ── CSS Styles ─────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
    --border: #30363d; --border2: #3d444d;
    --text: #e6edf3; --text2: #8b949e; --text3: #656d76;
    --accent: #58a6ff; --accent2: #1f6feb;
    --green: #3fb950; --red: #f85149; --yellow: #d29922;
    --radius: 8px; --sidebar-w: 300px; --header-h: 52px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; overflow: hidden; }

  #app { display: flex; flex-direction: column; height: 100vh; }
  #header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; padding: 0 12px; flex-shrink: 0; z-index: 100; }
  #header .logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
  #header .logo span { color: var(--accent); }
  .header-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }
  #body { display: flex; flex: 1; overflow: hidden; }

  #sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .sidebar-section { border-bottom: 1px solid var(--border); padding: 10px 12px; }
  .sidebar-section-title { font-size: 10px; font-weight: 600; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
  #sp-list-wrap { flex: 1; overflow-y: auto; padding: 6px; }
  .sp-item { display: flex; align-items: center; gap: 7px; padding: 6px 8px; border-radius: var(--radius); cursor: pointer; transition: background 0.12s; border: 1px solid transparent; }
  .sp-item:hover { background: var(--surface2); }
  .sp-item.active { background: rgba(88,166,255,0.08); border-color: rgba(88,166,255,0.25); }
  .sp-swatch { width: 13px; height: 13px; border-radius: 3px; cursor: pointer; border: 2px solid transparent; }
  .sp-name { flex: 1; font-size: 12px; font-weight: 500; }
  .sp-count { font-size: 10px; color: var(--text3); background: var(--surface2); padding: 1px 5px; border-radius: 10px; }

  #map-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
  #map-svg { width: 100%; height: 100%; cursor: grab; }
  #tooltip { position: absolute; pointer-events: none; background: var(--surface); color: var(--text); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 13px; font-size: 12px; display: none; z-index: 999; }

  .btn { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 4px; font-size: 11px; }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--accent2); color: #fff; }
  .btn.success { color: var(--green); border-color: var(--green); }

  #sync-pill { display:flex; align-items:center; gap:6px; padding:4px 10px; border-radius:20px; border:1px solid var(--border2); background:var(--surface2); font-size:10px; color:var(--text3); cursor:pointer; }
  #sync-pill.live { color:#3fb950; border-color:#3fb950; background:rgba(63,185,80,0.07); }
  #sync-pill.saving { color:#d29922; border-color:#d29922; background:rgba(210,153,34,0.07); }

  #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(4px); }
  #modal-overlay.open { display: flex; }
  #modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 18px; width: 380px; box-shadow: 0 24px 64px rgba(0,0,0,0.7); }
  
  #update-toast { position:fixed; bottom:56px; left:50%; transform:translateX(-50%); background:#1c2128; border:1px solid #3fb950; color:#3fb950; border-radius:20px; padding:7px 18px; font-size:12px; display:none; z-index: 9999; }
</style>

<script src="./INDIA_DISTRICTS.js"></script>

</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">Territory<span>IQ</span></div>
    <div class="header-actions">
      <button class="btn" id="undo-btn" disabled>↩ Undo</button>
      <button class="btn" id="reset-btn">⟳ Reset</button>
      <button class="btn success" id="dl-excel-btn">⬇ Export Excel</button>
      <div id="sync-pill" class="live" title="Cloud status - click to save">
        <div style="width:6px;height:6px;border-radius:50%;background:currentColor"></div>
        <span id="sync-text">Connecting...</span>
      </div>
    </div>
  </div>

  <div id="body">
    <div id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Search District</div>
        <input id="search-input" type="text" placeholder="Type district..." style="width:100%; background:var(--surface2); border:1px solid var(--border); color:#fff; padding:7px; border-radius:6px; outline:none;" />
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">State View</div>
        <select id="state-select" style="width:100%; background:var(--surface2); color:#fff; padding:6px; border-radius:6px; border:1px solid var(--border);">
          <option value="">🗺 All India</option>
        </select>
      </div>
      <div id="sp-list-wrap"><div id="sp-list"></div></div>
    </div>

    <div id="map-wrap">
      <div id="loading" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:var(--bg); z-index:1000;">
        <div style="text-align:center">
          <div style="border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 10px;"></div>
          <span style="font-size:12px">Loading Roto Map...</span>
        </div>
      </div>
      <svg id="map-svg"></svg>
      <div id="tooltip"></div>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-district-name">District</h3>
    <div id="modal-sp-list" style="max-height:250px; overflow-y:auto; margin:15px 0"></div>
    <div class="modal-actions" style="display:flex; gap:10px; justify-content:flex-end">
      <button class="btn" id="modal-cancel">Cancel</button>
      <button class="btn primary" id="modal-assign">Save to Cloud</button>
    </div>
  </div>
</div>

<div id="update-toast">🔄 Live: Map updated by Admin</div>
<div id="notif" style="position:fixed; top:20px; right:20px; background:var(--surface); border:1px solid var(--accent); color:var(--text); padding:10px 15px; border-radius:8px; display:none; z-index:10000"></div>

<script>
'use strict';

// 1. FIREBASE CONFIG (Tumhare screenshot se uthaya hua)
const firebaseConfig = {
  apiKey: "AIzaSyDvRV4TLHUnTmdTqq96Dopr8GGZfskjdA",
  authDomain: "territory-app-a9263.firebaseapp.com",
  databaseURL: "https://territory-app-a9263-default-rtdb.firebaseio.com", 
  projectId: "territory-app-a9263",
  storageBucket: "territory-app-a9263.firebasestorage.app",
  messagingSenderId: "243458285621",
  appId: "1:243458285621:web:634ea46284b2d97cd85bfc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 2. APP STATE
const COLOR_PALETTE = ["#4e9af1","#ef6c6c","#52c974","#ffc74a","#a78bfa","#fb923c","#38bdf8","#f472b6","#86efac","#d4a017"];
let assignments = {}, spColors = {}, spNames = {}, districtData = {};
let geoData = null, allDistricts = [], gSel, pathGen;
let isSaving = false;

// 3. CORE FUNCTIONS
function initSP() {
  for (let i = 0; i < 50; i++) {
    spColors[i] = COLOR_PALETTE[i % COLOR_PALETTE.length];
    spNames[i] = "Sales Person " + (i + 1);
  }
}

async function initMap() {
  if (typeof indiaGeoData === 'undefined') return alert("Error: INDIA_DISTRICTS.js not loaded.");
  geoData = indiaGeoData;
  
  allDistricts = geoData.features.map((f, i) => {
    const dname = (f.properties.district || f.properties.NAME_2 || `Dist_${i}`).trim();
    const sname = (f.properties.state || f.properties.NAME_1 || "Unknown").trim();
    f.properties._id = `${sname}__${dname}`;
    f.properties._district = dname;
    f.properties._state = sname;
    return f;
  });

  const stateSet = new Set(allDistricts.map(d => d.properties._state));
  const stSel = document.getElementById('state-select');
  Array.from(stateSet).sort().forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s; stSel.appendChild(opt);
  });

  const svg = d3.select("#map-svg");
  const W = document.getElementById('map-wrap').clientWidth;
  const H = document.getElementById('map-wrap').clientHeight;
  svg.attr("viewBox", `0 0 ${W} ${H}`);

  const projection = d3.geoMercator().fitSize([W, H], geoData);
  pathGen = d3.geoPath().projection(projection);
  
  const zoom = d3.zoom().scaleExtent([1, 20]).on("zoom", (e) => gSel.attr("transform", e.transform));
  svg.call(zoom);

  gSel = svg.append("g");
  gSel.selectAll("path")
    .data(allDistricts)
    .enter().append("path")
    .attr("d", pathGen)
    .attr("fill", "#1e2836")
    .attr("stroke", "rgba(255,255,255,0.1)")
    .attr("stroke-width", 0.5)
    .style("cursor", "pointer")
    .on("click", (e, d) => openAssignModal(d))
    .on("mouseenter", showTooltip)
    .on("mouseleave", hideTooltip);

  document.getElementById('loading').style.display = 'none';
}

// 4. CLOUD SYNC (The Real Magic)
function scheduleCloudSave() {
  const pwd = prompt("🔒 Admin Password (Roto@123):");
  if (pwd !== "Roto@123") return notify("❌ Access Denied");

  isSaving = true;
  setSyncPill('saving', 'Uploading...');
  
  const payload = {
    assignments, spNames, spColors, districtData,
    timestamp: Date.now()
  };

  db.ref('roto_map_v2').set(payload)
    .then(() => {
      isSaving = false;
      notify("✅ Cloud Updated!");
    })
    .catch(e => {
      isSaving = false;
      alert("Sync Error: " + e.message);
    });
}

db.ref('roto_map_v2').on('value', (snapshot) => {
  const data = snapshot.val();
  if (data) {
    assignments = data.assignments || {};
    spNames = data.spNames || spNames;
    refreshMap();
    renderSPList();
    if (!isSaving) showUpdateToast();
    setSyncPill('live', '● Cloud Live');
  }
});

function setSyncPill(cls, txt) {
  const p = document.getElementById('sync-pill');
  p.className = cls;
  document.getElementById('sync-text').textContent = txt;
}

// 5. UI UPDATES
function refreshMap() {
  gSel.selectAll("path").attr("fill", d => {
    const spIdx = assignments[d.properties._id];
    return spIdx !== undefined ? spColors[spIdx] : "#1e2836";
  });
}

function renderSPList() {
  const container = document.getElementById('sp-list');
  container.innerHTML = "";
  const counts = {};
  Object.values(assignments).forEach(idx => counts[idx] = (counts[idx]||0) + 1);

  for (let i = 0; i < 20; i++) { // Showing first 20 salespeople
    const div = document.createElement("div");
    div.className = "sp-item";
    div.innerHTML = `<span class="sp-swatch" style="background:${spColors[i]}"></span><span class="sp-name">${spNames[i]}</span><span class="sp-count">${counts[i]||0}</span>`;
    container.appendChild(div);
  }
}

let selectedDistrictId = null, pendingSP = null;
function openAssignModal(d) {
  selectedDistrictId = d.properties._id;
  document.getElementById('modal-district-name').textContent = d.properties._district;
  const list = document.getElementById('modal-sp-list');
  list.innerHTML = "";
  for(let i=0; i<20; i++) {
    const b = document.createElement("div");
    b.className = "sp-item";
    b.style.marginBottom = "4px";
    b.innerHTML = `<span class="sp-swatch" style="background:${spColors[i]}"></span> ${spNames[i]}`;
    b.onclick = () => {
      pendingSP = i;
      list.querySelectorAll('.sp-item').forEach(el => el.style.background = "none");
      b.style.background = "rgba(88,166,255,0.1)";
    };
    list.appendChild(b);
  }
  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('modal-assign').onclick = () => {
  if (pendingSP !== null) {
    assignments[selectedDistrictId] = pendingSP;
    scheduleCloudSave();
    document.getElementById('modal-overlay').classList.remove('open');
  }
};

document.getElementById('modal-cancel').onclick = () => document.getElementById('modal-overlay').classList.remove('open');

// 6. UTILS
function showTooltip(e, d) {
  const tt = document.getElementById('tooltip');
  tt.style.display = 'block';
  tt.style.left = (e.pageX + 15) + "px";
  tt.style.top = (e.pageY + 15) + "px";
  const spIdx = assignments[d.properties._id];
  tt.innerHTML = `<strong>${d.properties._district}</strong><br>${d.properties._state}<br>${spIdx !== undefined ? '👤 ' + spNames[spIdx] : '❌ Unassigned'}`;
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

function notify(m) {
  const n = document.getElementById('notif');
  n.textContent = m; n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 2500);
}

function showUpdateToast() {
  const t = document.getElementById('update-toast');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

document.getElementById('sync-pill').onclick = scheduleCloudSave;

// Initialize
(async () => {
  initSP();
  await initMap();
  renderSPList();
})();
</script>

<style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
