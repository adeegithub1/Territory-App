<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TerritoryIQ — India Sales Map v2 (Firebase Live)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<style>
  /* ── Yahan tera poora original CSS hai ──────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
    --border: #30363d; --border2: #3d444d;
    --text: #e6edf3; --text2: #8b949e; --text3: #656d76;
    --accent: #58a6ff; --accent2: #1f6feb;
    --green: #3fb950; --red: #f85149; --yellow: #d29922;
    --radius: 8px; --sidebar-w: 300px; --header-h: 52px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  #header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; padding: 0 12px; flex-shrink: 0; z-index: 100; flex-wrap: nowrap; }
  #header .logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; white-space: nowrap; }
  #header .logo span { color: var(--accent); }
  .header-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; flex-wrap: nowrap; }
  #body { display: flex; flex: 1; overflow: hidden; }
  #sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .sidebar-section { border-bottom: 1px solid var(--border); padding: 10px 12px; }
  .sidebar-section-title { font-size: 10px; font-weight: 600; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
  #sp-list-wrap { flex: 1; overflow-y: auto; padding: 6px; }
  .sp-item { display: flex; align-items: center; gap: 7px; padding: 6px 8px; border-radius: var(--radius); cursor: pointer; transition: background 0.12s; border: 1px solid transparent; }
  .sp-item:hover { background: var(--surface2); }
  .sp-item.active { background: rgba(88,166,255,0.08); border-color: rgba(88,166,255,0.25); }
  .sp-swatch { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
  .sp-swatch:hover { transform: scale(1.2); border-color: var(--text3); }
  .sp-name { flex: 1; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sp-name input { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 2px 5px; border-radius: 4px; font-size: 11px; font-family: inherit; width: 100%; outline: none; }
  .sp-count { font-size: 10px; color: var(--text3); background: var(--surface2); padding: 1px 5px; border-radius: 10px; min-width: 20px; text-align: center; }
  .sp-count.has-districts { color: var(--accent); background: rgba(88,166,255,0.1); }
  .sp-actions { display: flex; gap: 3px; opacity: 0; }
  .sp-item:hover .sp-actions { opacity: 1; }
  .sp-action-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 11px; padding: 2px 3px; }
  #map-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
  #map-svg { width: 100%; height: 100%; cursor: grab; }
  .district { cursor: pointer; shape-rendering: optimizeSpeed; }
  .district:hover { stroke: #ffffff !important; stroke-width: 0.5px !important; }
  #tooltip { position: absolute; pointer-events: none; background: var(--surface); color: var(--text); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 13px; font-size: 12px; display: none; z-index: 999; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
  .btn { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-family: inherit; font-size: 11px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
  .btn.primary { background: var(--accent2); border-color: var(--accent); color: #fff; }
  .btn.success { background: rgba(63,185,80,0.15); border-color: var(--green); color: var(--green); }
  #search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 10px 7px 30px; border-radius: var(--radius); font-size: 12px; outline: none; }
  #search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); z-index: 200; display: none; max-height: 200px; overflow-y: auto; }
  #search-results.open { display: block; }
  #stats-bar { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .stat-item { padding: 5px 12px; text-align: center; border-right: 1px solid var(--border); }
  .stat-val { font-size: 14px; font-weight: 700; font-family: 'Syne', sans-serif; }
  .stat-lbl { font-size: 9px; color: var(--text3); }
  #sync-pill { display:flex; align-items:center; gap:6px; padding:4px 10px; border-radius:20px; border:1px solid var(--border2); background:var(--surface2); font-size:10px; color:var(--text3); cursor:pointer; }
  #sync-pill.live { color:#3fb950; border-color:#3fb950; background:rgba(63,185,80,0.07); }
  #sync-pill.saving { color:#d29922; border-color:#d29922; background:rgba(210,153,34,0.07); }
  #update-toast { position:fixed; bottom:56px; left:50%; transform:translateX(-50%); background:#1c2128; border:1px solid #3fb950; color:#3fb950; border-radius:20px; padding:7px 18px; font-size:12px; display:none; animation:toastUp 0.25s ease; z-index: 9999; }
  @keyframes toastUp { from{opacity:0;transform:translateX(-50%) translateY(6px)} }
  .color-picker-popup { position: fixed; z-index: 1000; background: #1c2128; border: 1px solid #444c56; border-radius: 12px; display: none; width: 280px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
  .color-picker-popup.open { display: block; }
  #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: none; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(4px); }
  #modal-overlay.open { display: flex; }
  #modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 18px; width: 380px; }
  .mode-toggle { display: flex; border: 1px solid var(--border2); border-radius: 6px; overflow: hidden; }
  .mode-btn, .pump-mode-btn { padding: 4px 8px; font-size: 10px; font-weight: 500; background: none; border: none; color: var(--text2); cursor: pointer; flex: 1; }
  .mode-btn.active, .pump-mode-btn.active { background: var(--accent2); color: #fff; }
  #pump-legend { position: absolute; bottom: 40px; left: 12px; z-index: 200; background: rgba(22,27,34,0.92); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; display: none; }
  #pump-legend.visible { display: block; }
  #view-toggle-bar { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; }
  .view-tab { padding: 7px 20px; font-size: 12px; font-weight: 600; background: none; border: none; color: var(--text2); cursor: pointer; }
  .view-tab.active { background: var(--accent2); color: #fff; }
</style>

<script src="./INDIA_DISTRICTS.js"></script>

</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">Territory<span>IQ</span></div>
    <div class="header-actions">
      <button class="btn" id="undo-btn" disabled>↩ Undo</button>
      <button class="btn" id="reset-btn">⟳ Reset</button>
      <button class="btn success" id="excel-btn">📊 Upload Excel</button>
      <input type="file" id="excel-file" accept=".xlsx,.xls,.csv" style="display:none" />
      <button class="btn success" id="dl-excel-btn">⬇ Download Excel</button>
      <button class="btn primary" id="dl-png-btn">🖼 Download PNG</button>
      <div id="sync-pill" title="Click to manually save to cloud">
        <div style="width:6px;height:6px;border-radius:50%;background:currentColor"></div>
        <span id="sync-text">Loading...</span>
      </div>
    </div>
  </div>

  <div id="body">
    <div id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Search District</div>
        <div style="position:relative">
          <input id="search-input" type="text" placeholder="Type district..." autocomplete="off" />
          <div id="search-results"></div>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">State View</div>
        <select id="state-select" style="width:100%; background:var(--surface2); border:1px solid var(--border); color:#fff; padding:6px; border-radius:6px;">
          <option value="">🗺 All India</option>
        </select>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Highlight</div>
        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="all">All</button>
          <button class="mode-btn" data-mode="selected">Selected</button>
          <button class="mode-btn" data-mode="unassigned">Unassigned</button>
        </div>
      </div>
      <div class="sidebar-section" style="display:flex; align-items:center; gap:8px">
        <div class="sidebar-section-title" style="margin:0; flex:1">Salespeople</div>
        <button class="btn" id="bulk-assign-btn" style="font-size:9px; padding:2px 5px">Bulk</button>
      </div>
      <div id="sp-list-wrap"><div id="sp-list"></div></div>
    </div>

    <div id="map-wrap">
      <div id="loading" style="position:absolute; inset:0; background:var(--bg); z-index:999; display:flex; align-items:center; justify-content:center;">Loading Map...</div>
      
      <div id="view-toggle-bar">
        <button class="view-tab active" data-view="sp">👤 Salesperson</button>
        <button class="view-tab" data-view="pump">⛽ Pump Population</button>
      </div>

      <svg id="map-svg"></svg>
      <div id="pump-legend"></div>

      <div id="stats-bar">
        <div class="stat-item"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Districts</div></div>
        <div class="stat-item"><div class="stat-val" id="stat-assigned">0</div><div class="stat-lbl">Assigned</div></div>
        <div class="stat-item"><div class="stat-val" id="stat-coverage">0%</div><div class="stat-lbl">Coverage</div></div>
      </div>
      <div id="tooltip"></div>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-district-name">District</h3>
    <div id="modal-sp-list" style="max-height:200px; overflow-y:auto; margin:10px 0"></div>
    <div class="modal-actions" style="display:flex; gap:10px; justify-content:flex-end">
      <button class="btn danger" id="modal-unassign">Unassign</button>
      <button class="btn" id="modal-cancel">Cancel</button>
      <button class="btn primary" id="modal-assign">Save to Cloud</button>
    </div>
  </div>
</div>

<div id="update-toast">🔄 Real-time Update Received</div>
<div id="notif" style="position:fixed; top:60px; right:20px; background:var(--surface2); padding:10px; border-radius:8px; display:none; z-index:10000; border:1px solid var(--accent)"></div>

<div class="color-picker-popup" id="color-picker">
  <div style="padding:10px; display:flex; justify-content:space-between; font-size:10px; color:var(--text3);">COLOR PICKER <span id="color-cancel" style="cursor:pointer">✕</span></div>
  <input type="color" id="native-color-picker" style="width:100%; height:40px; cursor:pointer; background:none; border:none; padding:10px">
  <div style="padding:10px"><button class="btn primary" style="width:100%" id="cp-confirm">Apply Color</button></div>
</div>

<script>
// 1. FIREBASE CONFIG (Tumhara screenshot wala)
const firebaseConfig = {
  apiKey: "AIzaSyDvRV4TLHUnTmdTqq96Dopr8GGZfskjdA",
  authDomain: "territory-app-a9263.firebaseapp.com",
  databaseURL: "https://territory-app-a9263-default-rtdb.firebaseio.com", 
  projectId: "territory-app-a9263",
  appId: "1:243458285621:web:634ea46284b2d97cd85bfc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 2. STATE VARIABLES (Original logic)
let assignments = {}, spColors = {}, spNames = {}, districtData = {};
let geoData = null, allDistricts = [], gSel, pathGen, zoom;
let activeSP = null, highlightMode = 'all', currentView = 'sp';
let history = [];
const ADMIN_PASSWORD = "Roto@123";

// 3. INITIALIZE
function initSP() {
  const defaultColors = ["#4e9af1","#ef6c6c","#52c974","#ffc74a","#a78bfa","#fb923c","#38bdf8","#f472b6","#86efac","#d4a017"];
  for (let i = 0; i < 50; i++) {
    spColors[i] = defaultColors[i % 10];
    spNames[i] = "Sales Person " + (i + 1);
  }
}

async function initMap() {
  if (typeof indiaGeoData === 'undefined') return;
  geoData = indiaGeoData;
  
  allDistricts = geoData.features.map((f, i) => {
    const dname = (f.properties.district || f.properties.NAME_2 || `Dist_${i}`).trim();
    const sname = (f.properties.state || f.properties.NAME_1 || "Unknown").trim();
    f.properties._id = `${sname}__${dname}`;
    return f;
  });

  document.getElementById('stat-total').textContent = allDistricts.length;
  
  const stateSet = new Set(allDistricts.map(d => d.properties.state || d.properties.NAME_1));
  const stSel = document.getElementById('state-select');
  Array.from(stateSet).sort().forEach(s => {
    if(s) { const opt = document.createElement('option'); opt.value = s; opt.textContent = s; stSel.appendChild(opt); }
  });

  const wrap = document.getElementById('map-wrap');
  const svg = d3.select("#map-svg");
  const W = wrap.clientWidth, H = wrap.clientHeight;
  svg.attr("viewBox", `0 0 ${W} ${H}`);

  const projection = d3.geoMercator().fitSize([W, H], geoData);
  pathGen = d3.geoPath().projection(projection);
  
  zoom = d3.zoom().scaleExtent([1, 30]).on("zoom", (e) => gSel.attr("transform", e.transform));
  svg.call(zoom);

  gSel = svg.append("g");
  gSel.selectAll("path")
    .data(allDistricts)
    .enter().append("path")
    .attr("d", pathGen)
    .attr("class", "district")
    .attr("fill", "#1e2836")
    .attr("stroke", "#30363d")
    .attr("stroke-width", 0.3)
    .on("click", (e, d) => openAssignModal(d))
    .on("mouseenter", showTooltip)
    .on("mouseleave", hideTooltip);

  document.getElementById('loading').style.display = 'none';
  refreshMap();
}

// 4. CLOUD SYNC & REFRESH
function scheduleCloudSave() {
  const pwd = prompt("Enter Admin Password to Save Changes:");
  if (pwd !== ADMIN_PASSWORD) return notify("❌ Incorrect Password");

  setSyncPill('saving', 'Saving...');
  const payload = { assignments, spNames, spColors, districtData, ts: Date.now() };
  
  db.ref('territory_data_v2').set(payload)
    .then(() => notify("✅ Saved to Cloud"))
    .catch(e => alert("Sync Error: " + e.message));
}

db.ref('territory_data_v2').on('value', (snapshot) => {
  const data = snapshot.val();
  if (data) {
    assignments = data.assignments || {};
    spNames = data.spNames || spNames;
    spColors = data.spColors || spColors;
    districtData = data.districtData || {};
    refreshMap();
    renderSPList();
    setSyncPill('live', '● Cloud Live');
    showUpdateToast();
  }
});

function refreshMap() {
  if(!gSel) return;
  gSel.selectAll("path").attr("fill", d => {
    const spIdx = assignments[d.properties._id];
    return spIdx !== undefined ? spColors[spIdx] : "#1e2836";
  }).attr("opacity", d => {
    const spIdx = assignments[d.properties._id];
    if(highlightMode === 'selected' && activeSP !== null) return spIdx === activeSP ? 1 : 0.1;
    if(highlightMode === 'unassigned') return spIdx === undefined ? 1 : 0.1;
    return 1;
  });
  updateStats();
}

function updateStats() {
  const assigned = Object.keys(assignments).length;
  const total = allDistricts.length;
  document.getElementById('stat-assigned').textContent = assigned;
  document.getElementById('stat-coverage').textContent = total ? Math.round(assigned/total*100)+'%' : '0%';
}

function renderSPList() {
  const container = document.getElementById('sp-list');
  container.innerHTML = "";
  const counts = {};
  Object.values(assignments).forEach(idx => counts[idx] = (counts[idx]||0) + 1);

  for (let i = 0; i < 50; i++) {
    const div = document.createElement("div");
    div.className = "sp-item" + (activeSP === i ? " active" : "");
    div.innerHTML = `
      <span class="sp-swatch" style="background:${spColors[i]}" data-idx="${i}"></span>
      <span class="sp-name">${spNames[i]}</span>
      <div class="sp-actions"><button class="sp-action-btn" data-edit="${i}">✏️</button></div>
      <span class="sp-count ${counts[i]?'has-districts':''}">${counts[i]||0}</span>
    `;
    div.onclick = (e) => {
      if(e.target.dataset.edit || e.target.classList.contains('sp-swatch')) return;
      activeSP = activeSP === i ? null : i;
      refreshMap(); renderSPList();
    };
    container.appendChild(div);
  }

  // Edit Name
  container.querySelectorAll('.sp-action-btn').forEach(btn => {
    btn.onclick = (e) => {
      const idx = e.target.dataset.edit;
      const newName = prompt("New Name:", spNames[idx]);
      if(newName) { spNames[idx] = newName; scheduleCloudSave(); }
    };
  });

  // Edit Color
  container.querySelectorAll('.sp-swatch').forEach(sw => {
    sw.onclick = (e) => {
      const idx = e.target.dataset.idx;
      openColorPicker(idx, e.target);
    };
  });
}

// 5. MODALS & UI
let selectedDistrictId = null, pendingSP = null;
function openAssignModal(d) {
  selectedDistrictId = d.properties._id;
  document.getElementById('modal-district-name').textContent = d.properties.district || d.properties.NAME_2;
  const list = document.getElementById('modal-sp-list');
  list.innerHTML = "";
  for(let i=0; i<50; i++) {
    const b = document.createElement("div");
    b.className = "sp-opt sp-item";
    b.innerHTML = `<span class="sp-swatch" style="background:${spColors[i]}"></span> ${spNames[i]}`;
    b.onclick = () => {
      pendingSP = i;
      list.querySelectorAll('.sp-opt').forEach(el => el.style.background="none");
      b.style.background = "rgba(88,166,255,0.1)";
    };
    list.appendChild(b);
  }
  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('modal-assign').onclick = () => {
  if(pendingSP !== null) { assignments[selectedDistrictId] = pendingSP; scheduleCloudSave(); closeM(); }
};
document.getElementById('modal-unassign').onclick = () => {
  delete assignments[selectedDistrictId]; scheduleCloudSave(); closeM();
};
function closeM() { document.getElementById('modal-overlay').classList.remove('open'); pendingSP = null; }
document.getElementById('modal-cancel').onclick = closeM;

// Color Picker Logic
let cpTargetIdx = null;
function openColorPicker(idx, anchor) {
  cpTargetIdx = idx;
  const cp = document.getElementById('color-picker');
  const rect = anchor.getBoundingClientRect();
  cp.style.top = rect.bottom + 'px'; cp.style.left = rect.left + 'px';
  cp.classList.add('open');
}
document.getElementById('cp-confirm').onclick = () => {
  const col = document.getElementById('native-color-picker').value;
  spColors[cpTargetIdx] = col;
  document.getElementById('color-picker').classList.remove('open');
  scheduleCloudSave();
};
document.getElementById('color-cancel').onclick = () => document.getElementById('color-picker').classList.remove('open');

// 6. UTILS
function showTooltip(e, d) {
  const tt = document.getElementById('tooltip');
  tt.style.display = 'block'; tt.style.left = (e.pageX + 15) + "px"; tt.style.top = (e.pageY + 15) + "px";
  const name = d.properties.district || d.properties.NAME_2;
  const sp = assignments[d.properties._id] !== undefined ? spNames[assignments[d.properties._id]] : 'Unassigned';
  tt.innerHTML = `<strong>${name}</strong><br>👤 ${sp}`;
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }
function notify(m) { const n = document.getElementById('notif'); n.textContent = m; n.style.display = 'block'; setTimeout(() => n.style.display = 'none', 3000); }
function showUpdateToast() { const t = document.getElementById('update-toast'); t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
function setSyncPill(cls, txt) { const p = document.getElementById('sync-pill'); p.className = cls; document.getElementById('sync-text').textContent = txt; }

// Events
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); highlightMode = btn.dataset.mode; refreshMap();
  };
});

document.getElementById('sync-pill').onclick = scheduleCloudSave;

// Initialize
(async () => {
  initSP();
  await initMap();
  renderSPList();
})();
</script>
</body>
</html>
