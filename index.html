<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TerritoryIQ — India Sales Map v2 (Firebase Live)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="INDIA_DISTRICTS.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<style>
  /* ── CSS Styles ─────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
    --border: #30363d; --border2: #3d444d;
    --text: #e6edf3; --text2: #8b949e; --text3: #656d76;
    --accent: #58a6ff; --accent2: #1f6feb;
    --green: #3fb950; --red: #f85149; --yellow: #d29922;
    --radius: 8px; --sidebar-w: 300px; --header-h: 52px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  #header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; padding: 0 12px; flex-shrink: 0; z-index: 100; }
  .header-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }
  #body { display: flex; flex: 1; overflow: hidden; }
  #sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .sidebar-section { border-bottom: 1px solid var(--border); padding: 10px 12px; }
  .sidebar-section-title { font-size: 10px; font-weight: 600; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
  #sp-list-wrap { flex: 1; overflow-y: auto; padding: 6px; }
  .sp-item { display: flex; align-items: center; gap: 7px; padding: 6px 8px; border-radius: var(--radius); cursor: pointer; transition: background 0.12s; }
  .sp-swatch { width: 12px; height: 12px; border-radius: 3px; }
  .sp-name { flex: 1; font-size: 12px; }
  #map-wrap { flex: 1; position: relative; background: var(--bg); }
  #map-svg { width: 100%; height: 100%; }
  #sync-pill { display:flex; align-items:center; gap:6px; padding:4px 10px; border-radius:20px; border:1px solid var(--border2); font-size:10px; cursor:pointer; }
  #sync-pill.live { color:#3fb950; border-color:#3fb950; }
  #tooltip { position: absolute; pointer-events: none; background: var(--surface); color: var(--text); border: 1px solid var(--border2); border-radius: 8px; padding: 8px; font-size: 12px; display: none; z-index: 999; }
  #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; }
  #modal { background: var(--surface); padding: 20px; border-radius: 12px; width: 350px; }
  .btn { padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; border: 1px solid var(--border2); background: var(--surface2); color: #fff; }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div style="font-family:'Syne'; font-weight:800; font-size:18px;">Territory<span style="color:var(--accent)">IQ</span></div>
    <div class="header-actions">
      <button class="btn" id="reset-btn">⟳ Reset</button>
      <div id="sync-pill" class="live"><span id="sync-text">Cloud Live</span></div>
    </div>
  </div>
  <div id="body">
    <div id="sidebar">
      <div class="sidebar-section"><div class="sidebar-section-title">Salespeople</div><div id="sp-list"></div></div>
    </div>
    <div id="map-wrap"><svg id="map-svg"></svg><div id="tooltip"></div></div>
  </div>
</div>

<div id="modal-overlay"><div id="modal"><h3 id="m-title"></h3><div id="m-list" style="margin:15px 0; max-height:200px; overflow-y:auto;"></div><button class="btn" id="m-cancel">Cancel</button></div></div>

<script>
// 1. FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDvRV4TLHUnTmdTqq96Dopr8GGZfskjdA",
  authDomain: "territory-app-a9263.firebaseapp.com",
  databaseURL: "https://territory-app-a9263-default-rtdb.firebaseio.com", 
  projectId: "territory-app-a9263",
  appId: "1:243458285621:web:634ea46284b2d97cd85bfc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 2. DATA
const COLORS = ["#4e9af1","#ef6c6c","#52c974","#ffc74a","#a78bfa","#fb923c","#38bdf8","#f472b6"];
let assignments = {}, spNames = {};
for(let i=0; i<20; i++) spNames[i] = "Sales Person " + (i+1);

// 3. MAP LOAD
async function init() {
  console.log("Checking Map Data...");
  if (typeof indiaGeoData === 'undefined') {
    alert("❌ Error: INDIA_DISTRICTS.js load nahi hui! GitHub par file name check karo.");
    return;
  }

  const svg = d3.select("#map-svg");
  const W = document.getElementById('map-wrap').clientWidth;
  const H = document.getElementById('map-wrap').clientHeight;
  const projection = d3.geoMercator().fitSize([W, H], indiaGeoData);
  const path = d3.geoPath().projection(projection);
  const g = svg.append("g");

  g.selectAll("path")
    .data(indiaGeoData.features)
    .enter().append("path")
    .attr("d", path)
    .attr("fill", "#1e2836")
    .attr("stroke", "#30363d")
    .attr("stroke-width", 0.5)
    .on("click", (e, d) => openM(d))
    .on("mouseenter", (e, d) => {
        const tt = document.getElementById('tooltip');
        tt.style.display = 'block';
        tt.style.left = e.pageX + 'px'; tt.style.top = e.pageY + 'px';
        const name = d.properties.district || d.properties.NAME_2 || "Unknown";
        tt.innerHTML = name;
    })
    .on("mouseleave", () => document.getElementById('tooltip').style.display='none');

  window.updateMap = () => {
    g.selectAll("path").attr("fill", d => {
      const id = d.properties.district || d.properties.NAME_2;
      return assignments[id] !== undefined ? COLORS[assignments[id] % 8] : "#1e2836";
    });
  };
}

// 4. SYNC
db.ref('roto_v2').on('value', snap => {
  const data = snap.val();
  if(data) { assignments = data; updateMap(); renderList(); }
});

function save() {
  const p = prompt("Password:");
  if(p === "Roto@123") db.ref('roto_v2').set(assignments);
}

function renderList() {
  const c = document.getElementById('sp-list'); c.innerHTML = "";
  const counts = {}; Object.values(assignments).forEach(v => counts[v] = (counts[v]||0)+1);
  for(let i=0; i<10; i++) {
    const d = document.createElement('div'); d.className = "sp-item";
    d.innerHTML = `<span class="sp-swatch" style="background:${COLORS[i%8]}"></span> ${spNames[i]} (${counts[i]||0})`;
    c.appendChild(d);
  }
}

function openM(d) {
  const id = d.properties.district || d.properties.NAME_2;
  document.getElementById('m-title').textContent = id;
  const list = document.getElementById('m-list'); list.innerHTML = "";
  for(let i=0; i<10; i++) {
    const b = document.createElement('div'); b.textContent = spNames[i];
    b.style.cursor = "pointer"; b.onclick = () => { assignments[id] = i; save(); document.getElementById('modal-overlay').classList.remove('open'); };
    list.appendChild(b);
  }
  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('m-cancel').onclick = () => document.getElementById('modal-overlay').classList.remove('open');

init();
</script>
</body>
</html>
